<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Telegram Mini App Ads</title>

  <!-- Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>

  <!-- RichAds Script -->
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
</head>

<body>

  <h2>Play & Earn</h2>

  <!-- Button -->
  <button onclick="showRewardAd()">🎮 Play Game (Watch Ad)</button>

  <script>
    // Init Ads
    window.TelegramAdsController = new TelegramAdsController();
    window.TelegramAdsController.initialize({
      pubId: "1008310",
      appId: "7019",
    });

    // Rewarded Ad Function
    function showRewardAd() {
      window.TelegramAdsController.showAd({
        format: 'rewarded',

        onOpen: () => {
          console.log("Ad Started");
        },

        onClose: () => {
          console.log("Ad Closed");
          rewardUser();
        },

        onError: (err) => {
          console.log("Ad Error:", err);
          alert("Ad not available এখন");
        }
      });
    }

    // Reward System
    function rewardUser() {
      alert("✅ You earned reward!");

      // Example: coin add
      let coins = localStorage.getItem("coins") || 0;
      coins = parseInt(coins) + 10;
      localStorage.setItem("coins", coins);

      console.log("Total Coins:", coins);
    }
  </script>

</body>
</html>
